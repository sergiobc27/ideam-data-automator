<svg viewBox="0 0 1240 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arquitectura: este repositorio contiene la herramienta local, el espejo de datos y la API; el repositorio website contiene la plataforma web">
  <defs>
    <marker id="flecha3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C9A227"/>
    </marker>
  </defs>
  <style>
    .base{font-family:'Segoe UI',-apple-system,'Helvetica Neue',Arial,sans-serif}
    .repo{font-size:16px;font-weight:700;letter-spacing:1px;fill:#C9A227}
    .titulo3{font-size:20px;font-weight:800;fill:#f3f4f6}
    .detalle3{font-size:15.5px;fill:#b8bcc4}
    .etq{font-size:14.5px;font-weight:600;fill:#e8c862}
  </style>

  <rect x="0" y="0" width="1240" height="560" rx="22" fill="#0f1115" stroke="#2a2e37" stroke-width="1.5"/>

  <!-- Fuente: Socrata -->
  <rect x="30" y="220" width="230" height="120" rx="16" fill="#101b33" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="145" y="268" text-anchor="middle" class="base titulo3">datos.gov.co</text>
  <text x="145" y="296" text-anchor="middle" class="base detalle3">Datos abiertos del IDEAM</text>
  <text x="145" y="318" text-anchor="middle" class="base detalle3">(Socrata)</text>

  <!-- Repo 1 -->
  <rect x="320" y="34" width="560" height="492" rx="18" fill="none" stroke="#C9A227" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="344" y="66" class="base repo">sergiobc27/ideam-data-automator · ESTE REPOSITORIO</text>

  <rect x="352" y="92" width="496" height="118" rx="14" fill="#171a21" stroke="#0e7490" stroke-width="2.5"/>
  <text x="600" y="130" text-anchor="middle" class="base titulo3">Herramienta local (CLI + TUI)</text>
  <text x="600" y="158" text-anchor="middle" class="base detalle3">La que instalas con pip: descarga los datos</text>
  <text x="600" y="180" text-anchor="middle" class="base detalle3">directo a tu PC, funciona por sí sola</text>

  <rect x="352" y="238" width="496" height="118" rx="14" fill="#171a21" stroke="#0e7490" stroke-width="2.5"/>
  <text x="600" y="276" text-anchor="middle" class="base titulo3">Espejo PostgreSQL + TimescaleDB</text>
  <text x="600" y="304" text-anchor="middle" class="base detalle3">Copia completa del histórico, actualizada</text>
  <text x="600" y="326" text-anchor="middle" class="base detalle3">a diario en un servidor de Oracle Cloud</text>

  <rect x="352" y="384" width="496" height="110" rx="14" fill="#171a21" stroke="#0e7490" stroke-width="2.5"/>
  <text x="600" y="422" text-anchor="middle" class="base titulo3">API FastAPI</text>
  <text x="600" y="450" text-anchor="middle" class="base detalle3">Sirve el espejo de datos a la plataforma web</text>

  <!-- Flechas fuente -> repo1 -->
  <line x1="260" y1="250" x2="348" y2="160" stroke="#C9A227" stroke-width="3" marker-end="url(#flecha3)"/>
  <line x1="260" y1="310" x2="348" y2="300" stroke="#C9A227" stroke-width="3" marker-end="url(#flecha3)"/>
  <!-- Espejo -> API -->
  <line x1="600" y1="356" x2="600" y2="380" stroke="#C9A227" stroke-width="3" marker-end="url(#flecha3)"/>

  <!-- Repo 2 -->
  <rect x="940" y="120" width="270" height="220" rx="18" fill="none" stroke="#C9A227" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="964" y="152" class="base repo">sergiobc27/website</text>
  <rect x="962" y="176" width="226" height="136" rx="14" fill="#171a21" stroke="#0e7490" stroke-width="2.5"/>
  <text x="1075" y="216" text-anchor="middle" class="base titulo3">Plataforma web</text>
  <text x="1075" y="244" text-anchor="middle" class="base detalle3">React + Worker de</text>
  <text x="1075" y="266" text-anchor="middle" class="base detalle3">Cloudflare: gráficas,</text>
  <text x="1075" y="288" text-anchor="middle" class="base detalle3">mapas, IDF, asistente</text>

  <!-- API -> web -->
  <line x1="848" y1="420" x2="1060" y2="316" stroke="#C9A227" stroke-width="3" marker-end="url(#flecha3)"/>
  <text x="985" y="392" text-anchor="middle" class="base etq">Cloudflare Tunnel</text>

  <!-- Web -> usuario -->
  <rect x="962" y="400" width="226" height="94" rx="14" fill="#0d2416" stroke="#078930" stroke-width="2.5"/>
  <text x="1075" y="438" text-anchor="middle" class="base titulo3">ideam.sergiobc.com</text>
  <text x="1075" y="466" text-anchor="middle" class="base detalle3">Sin instalar nada</text>
  <line x1="1075" y1="312" x2="1075" y2="396" stroke="#C9A227" stroke-width="3" marker-end="url(#flecha3)"/>
</svg>
