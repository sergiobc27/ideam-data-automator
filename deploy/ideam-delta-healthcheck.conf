# ============================================================
# ideam-delta-healthcheck.conf   (drop-in systemd, OPCIONAL)
# ------------------------------------------------------------
# Anade monitoreo healthchecks.io a ideam-delta.service SIN
# tocar la unidad original:
#   - ExecStartPost: al terminar OK el delta, hace ping de exito
#     a $HEALTHCHECK_URL (curl silencioso).
#   - OnFailure: si el delta falla, dispara
#     ideam-notify-fail@delta.service que hace ping a
#     $HEALTHCHECK_URL/fail.
# Ambos leen HEALTHCHECK_URL de /etc/ideam/ideam.env; si no esta
# definida, el curl no se ejecuta y nada se rompe.
#
# REQUISITO: crea un check GRATIS en https://healthchecks.io
# (plan free: 20 checks, alertas por email). Configura su
# "period" a ~1 dia con grace acorde a las corridas 04:00/16:00
# y copia su ping URL a /etc/ideam/ideam.env:
#     HEALTHCHECK_URL=https://hc-ping.com/<uuid-del-check>
# Healthchecks.io te avisa si el ping de exito NO llega a tiempo
# (delta colgado o timer parado), ademas del ping /fail explicito.
#
# INSTALACION:
#   sudo mkdir -p /etc/systemd/system/ideam-delta.service.d
#   sudo install -m 644 deploy/ideam-delta-healthcheck.conf \
#       /etc/systemd/system/ideam-delta.service.d/healthcheck.conf
#   sudo install -m 644 deploy/ideam-notify-fail@.service /etc/systemd/system/
#   sudo systemctl daemon-reload
# Para desactivarlo: borra el drop-in y daemon-reload.
# ============================================================
[Service]
# Ping de exito tras una corrida correcta del delta.
ExecStartPost=/bin/sh -c '[ -n "$HEALTHCHECK_URL" ] && curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL" || true'

[Unit]
# Ping de fallo si el delta sale con error.
OnFailure=ideam-notify-fail@delta.service
