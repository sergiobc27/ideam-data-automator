# ============================================================
# cloudflared-restart.conf  (drop-in systemd)
# ------------------------------------------------------------
# El tunel es el unico camino entre Cloudflare y la API: si el
# proceso muere (incluso con exit 0), debe volver SIEMPRE.
# El unit que instala `cloudflared service install` trae solo
# Restart=on-failure.
#
# INSTALACION:
#   sudo mkdir -p /etc/systemd/system/cloudflared.service.d
#   sudo install -m 644 deploy/cloudflared-restart.conf \
#       /etc/systemd/system/cloudflared.service.d/restart.conf
#   sudo systemctl daemon-reload
# ============================================================
[Service]
Restart=always
RestartSec=5s
